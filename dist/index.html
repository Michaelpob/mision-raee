<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mision RAEE 3D</title>
    <script type="module" crossorigin src="./assets/index-DBRQC069.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-1_5dPfFU.css">
  </head>
  <body>
    <main id="game">
      <canvas id="scene" aria-label="Juego 3D Mision RAEE"></canvas>

      <section class="hud hud-top" aria-label="Estado de la mision">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <div>
            <p>Mision RAEE</p>
            <strong>Ciudad Circular</strong>
          </div>
        </div>
        <div class="meters">
          <div>
            <span>Puntos</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>Recuperado</span>
            <strong id="recovered">0 kg</strong>
          </div>
          <div>
            <span>Riesgo</span>
            <strong id="risk">0%</strong>
          </div>
        </div>
      </section>

      <section class="hud mission-panel" aria-live="polite">
        <span id="carried">Sin carga</span>
        <strong id="mission">Recoge un aparato abandonado y llévalo al punto adecuado.</strong>
        <p id="fact">Separar RAEE evita que metales pesados lleguen al suelo y al agua.</p>
      </section>

      <section class="legend" aria-label="Tipos de entrega">
        <div><span class="swatch raee"></span> RAEE</div>
        <div><span class="swatch battery"></span> Pilas</div>
        <div><span class="swatch repair"></span> Reparar</div>
        <div><span class="swatch trash"></span> Basura comun</div>
      </section>

      <button id="start" class="start-button" type="button">Iniciar mision</button>

      <div class="touch-pad" aria-label="Controles tactiles">
        <button data-move="up" type="button" aria-label="Mover arriba">▲</button>
        <button data-move="left" type="button" aria-label="Mover izquierda">◀</button>
        <button data-move="down" type="button" aria-label="Mover abajo">▼</button>
        <button data-move="right" type="button" aria-label="Mover derecha">▶</button>
      </div>
    </main>

  </body>
</html>
